<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StackAssist</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section class="hero">
    <h1>StackAssist</h1>
    <p>Search real Stack Overflow threads and find developer solutions faster.</p>
  </section>

  <section class="search-box">
    <textarea id="questionInput" placeholder="Paste your error or coding question here..."></textarea>
    <button id="searchBtn">Find Solutions</button>
  </section>

  <section class="results" id="results">
    <h2>Results</h2>
    <p class="empty">Enter a coding problem to search Stack Overflow.</p>
  </section>

  <script src="script.js"></script>
</body>
</html>
