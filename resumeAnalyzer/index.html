<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Resume Analyzer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
    <body>

  <section class="hero">
    <h1>AI Resume Analyzer</h1>

    <p>
      Compare your resume with a job description and get smart improvement suggestions.
    </p>
  </section>

  <section class="analyzer">

    <div class="input-box">
      <h2>Your Resume</h2>

      <textarea
        id="resumeInput"
        placeholder="Paste your resume here..."
      ></textarea>
    </div>

    <div class="input-box">
      <h2>Job Description</h2>

      <textarea
        id="jobInput"
        placeholder="Paste the job description here..."
      ></textarea>
    </div>

  </section>

  <div class="button-area">
    <button id="analyzeBtn">Analyze Resume</button>
  </div>

  <section class="results">

    <h2>Analysis Result</h2>

    <p id="score">Match Score: --%</p>

    <p id="feedback">
      Paste your resume and a job description to get feedback.
    </p>

  </section>

  <script src="script.js"></script>

</body>
</body>
</html>
