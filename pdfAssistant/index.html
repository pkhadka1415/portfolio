<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI PDF Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section class="hero">
    <h1>AI PDF Assistant</h1>
    <p>Paste document text, ask questions, and get quick answers from the content.</p>
  </section>

  <section class="app">
    <div class="input-card">
      <h2>Document Text</h2>
      <textarea id="documentInput" placeholder="Paste PDF or document text here..."></textarea>
    </div>

    <div class="input-card">
      <h2>Ask a Question</h2>
      <input id="questionInput" type="text" placeholder="Example: What is this document about?" />
      <button id="askBtn">Ask Assistant</button>

      <div class="answer-box">
        <h3>Answer</h3>
        <p id="answerText">Paste a document and ask a question to get started.</p>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
